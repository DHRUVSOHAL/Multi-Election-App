```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voter Login</title>

<link href="../css/output.css" rel="stylesheet">

</head>

<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center px-4">

<div class="bg-white w-full max-w-md p-8 rounded-xl shadow-lg">

<h1 class="text-3xl font-bold text-gray-800 text-center mb-2">
Login 🔐
</h1>

<p class="text-gray-500 text-center mb-6">
Login to access the voting system
</p>

<form id="loginForm" class="space-y-5">

<div>
<label class="block text-sm font-semibold mb-1">
Username
</label>

<input
id="username"
type="text"
placeholder="Enter your username"
class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
required
>

</div>


<div>
<label class="block text-sm font-semibold mb-1">
Password
</label>

<input
id="password"
type="password"
placeholder="Enter your password"
class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
required
>

</div>


<button
type="submit"
class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition"
>
Login
</button>

</form>


<p class="text-center text-sm text-gray-500 mt-6">

<a href="index.html" class="text-blue-600 hover:underline">
← Back to Home
</a>

</p>

</div>

</div>

<script src="../js/login.js"></script>

</body>
</html>
```
