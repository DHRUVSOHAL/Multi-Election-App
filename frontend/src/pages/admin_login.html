<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="../css/output.css" rel="stylesheet">

<title>Admin Login</title>
</head>

<body class="bg-gradient-to-r from-blue-100 via-purple-100 to-pink-100 min-h-screen flex items-center justify-center">

<div class="backdrop-blur-lg bg-white/80 p-8 rounded-2xl shadow-xl w-96 border border-white/40">

<h1 class="text-3xl font-bold mb-6 text-center text-gray-800">
  Admin Login ⚙️
</h1>

<!-- Election ID -->
<div class="mb-4">
<label class="block text-gray-700 mb-1">Election ID</label>
<input
id="electionId"
type="text"
class="w-full border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
placeholder="Enter Election ID">
</div>

<!-- Password -->
<div class="mb-6 relative">
<label class="block text-gray-700 mb-1">Password</label>
<input
id="password"
type="password"
class="w-full border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 transition"
placeholder="Enter Password">

<!-- Show/Hide Button -->
<button type="button" id="togglePassword"
class="absolute right-2 top-9 text-sm text-gray-500">
👁
</button>
</div>

<!-- Login Button -->
<button
id="adminLoginBtn"
class="w-full bg-gradient-to-r from-blue-500 to-purple-500 text-white py-2 rounded-lg hover:opacity-90 transition font-semibold">
Login
</button>

</div>

<script>
// 👁 Show/Hide Password
document.getElementById("togglePassword").addEventListener("click", () => {
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
});
</script>

<script src="../js/adminlogin.js"></script>

</body>
</html>
