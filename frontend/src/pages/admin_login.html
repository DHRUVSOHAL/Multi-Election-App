<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link href="../css/output.css" rel="stylesheet">
<body class="bg-gray-100">

  <div class="min-h-screen flex items-center justify-center px-4">

    <!-- Login Card -->
    <div class="bg-white w-full max-w-md rounded-xl shadow-lg p-8">

      <!-- Heading -->
      <h1 class="text-3xl font-bold text-gray-800 text-center mb-2">
        Admin Election Login 🗳️
      </h1>

      <p class="text-gray-500 text-center mb-6">
        Enter Election ID and Admin Password
      </p>

      <!-- Form -->
      <form class="space-y-5">

        <!-- Election ID -->
        <div>
          <label class="block text-sm font-semibold mb-1">
            Election ID
          </label>
          <input 
          type="text"
          placeholder="ELEC-2026-001"
          class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 outline-none">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold mb-1">
            Admin Password
          </label>
          <input 
          type="password"
          placeholder="Enter admin password"
          class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 outline-none">
        </div>

        <!-- Login Button -->
        <button id ="admin-login-btn"
        class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition">
          Login
        </button>

      </form>

      <!-- Back -->
      <div class="text-center mt-6">
        <a href="index.html" class="text-blue-600 hover:underline text-sm">
          ← Back to Home
        </a>
      </div>

    </div>

  </div>

</body>
<script src="../js/index.js"></script>
</html>
