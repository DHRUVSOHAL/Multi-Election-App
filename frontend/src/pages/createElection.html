<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Election</title>

<link href="../css/output.css" rel="stylesheet">
</head>

<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center px-4 mt-20">

<div class="bg-white w-full max-w-2xl rolounded-xl shadow-lg p-8">

<!-- Header -->
<h1 class="text-3xl font-bold text-gray-800 mb-2 flex justify-center items-center gap-2">
Create New Election 🗳️
</h1>

<p class="text-gray-500 mb-6">
Fill in election details carefully
</p>

<!-- FORM -->
<form id="createElectionForm" class="space-y-5">

<!-- Title -->
<div>
<label class="block text-sm font-semibold mb-1">Election Title</label>
<input id="title" type="text"
placeholder="Student Council Election"
class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
</div>

<!-- Description -->
<div>
<label class="block text-sm font-semibold mb-1">Description</label>
<textarea id="description" rows="3"
placeholder="Election details..."
class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
</div>

<!-- Dates -->
<div class="grid md:grid-cols-2 gap-4">

<div>
<label class="block text-sm font-semibold mb-1">Start Date</label>
<input id="startDate" type="date"
class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
</div>

<div>
<label class="block text-sm font-semibold mb-1">End Date</label>
<input id="endDate" type="date"
class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
</div>

</div>

<!-- Election ID -->
<div>
<label class="block text-sm font-semibold mb-1">Election ID</label>
<input id="electionId" type="text"
placeholder="ELEC-2026-001"
class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
</div>

<!-- Password -->
<div>
<label class="block text-sm font-semibold mb-1">Admin Password</label>
<input id="password" type="password"
placeholder="Secure password"
class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
</div>

<!-- Active -->
<div class="flex items-center gap-3">
<input id="isActive" type="checkbox" checked
class="w-5 h-5 accent-blue-600">
<span class="text-sm font-medium text-gray-700">
Set Election Active
</span>
</div>

<!-- Submit -->
<button type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">
Create Election
</button>

</form>

<p id="message" class="text-center mt-4 text-red-500"></p>

</div>

</div>

</body>

<script src="../js/createElection.js"></script>

</html>
