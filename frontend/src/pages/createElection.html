<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Election</title>

<link href="../css/output.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-r from-blue-100 via-purple-100 to-pink-100 min-h-screen">

<div class="min-h-screen flex items-center justify-center px-4">

<div class="backdrop-blur-lg bg-white/80 w-full max-w-2xl rounded-2xl shadow-xl p-8 border border-white/40">

<!-- Header -->
<h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">
  Create New Election 🗳️
</h1>

<p class="text-gray-500 mb-6 text-center">
  Fill in election details carefully
</p>

<!-- FORM -->
<form id="createElectionForm" class="space-y-5">

<!-- Title -->
<div>
<label class="block text-sm font-semibold mb-1">Election Title</label>
<input id="title" type="text"
placeholder="Student Council Election"
class="w-full border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition">
</div>

<!-- Description -->
<div>
<label class="block text-sm font-semibold mb-1">Description</label>
<textarea id="description" rows="3"
placeholder="Election details..."
class="w-full border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 transition"></textarea>
</div>

<!-- Dates -->
<div class="grid md:grid-cols-2 gap-4">

<div>
<label class="block text-sm font-semibold mb-1">Start Date</label>
<input id="startDate" type="date"
class="w-full border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition">
</div>

<div>
<label class="block text-sm font-semibold mb-1">End Date</label>
<input id="endDate" type="date"
class="w-full border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 transition">
</div>

</div>

<!-- Election ID -->
<div>
<label class="block text-sm font-semibold mb-1">Election ID</label>
<input id="electionId" type="text"
placeholder="ELEC-2026-001"
class="w-full border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400 transition">
</div>

<!-- Password -->
<div class="relative">
<label class="block text-sm font-semibold mb-1">Admin Password</label>
<input id="password" type="password"
placeholder="Secure password"
class="w-full border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400 transition">

<!-- 👁 Toggle -->
<button type="button" id="togglePassword"
class="absolute right-3 top-9 text-gray-500">
👁
</button>
</div>

<!-- Active -->
<div class="flex items-center gap-3">
<input id="isActive" type="checkbox" checked
class="w-5 h-5 accent-blue-600">
<span class="text-sm font-medium text-gray-700">
Set Election Active
</span>
</div>

<!-- Submit -->
<button type="submit"
class="w-full bg-gradient-to-r from-blue-500 to-purple-500 text-white font-semibold py-3 rounded-lg hover:opacity-90 transition">
Create Election
</button>

</form>

<p id="message" class="text-center mt-4 text-red-500"></p>

</div>

</div>

<!-- JS -->
<script>
// 👁 Show/Hide Password
document.getElementById("togglePassword").addEventListener("click", () => {
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
});
</script>

<script src="../js/createElection.js"></script>

</body>
</html>
