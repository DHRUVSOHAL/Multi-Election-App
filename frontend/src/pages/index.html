<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="../css/output.css" rel="stylesheet">
  <title>Voting App</title>
</head>

<body class="bg-gray-100">

  <!-- Main Container -->
  <div class="min-h-screen flex flex-col items-center justify-center px-6">

    <!-- Welcome Section -->
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-gray-800">
        Hey, Welcome to My Voting App 🗳️
      </h1>
      <p class="mt-3 text-gray-600">
        Secure, Simple, and Fast Online Voting
      </p>
    </div>

    <!-- Cards Section -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-5xl">

      <!-- Create Election -->
      <div class="bg-white p-8 rounded-xl shadow text-center hover:shadow-lg transition">
        <h2 class="text-2xl font-semibold mb-4">Create Election</h2>
        <p class="text-gray-600 mb-6">
          Start a new election as an admin
        </p>
        <button id="create-election-btn"
        class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
          Create Election
        </button>
      </div>

      <!-- Login -->
      <div class="bg-white p-8 rounded-xl shadow text-center hover:shadow-lg transition">
        <h2 class="text-2xl font-semibold mb-4">Login</h2>
        <p class="text-gray-600 mb-6">
          Login as voter 
        </p>
        <button id="login-btn"
        class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">
          Login
        </button>
      </div>

      <!-- Login to Particular Election -->
      <div class="bg-white p-8 rounded-xl shadow text-center hover:shadow-lg transition">
        <h2 class="text-2xl font-semibold mb-4">Election Login</h2>
        <p class="text-gray-600 mb-6">
          Login using Election ID and Password
        </p>
        <button id="election-login-btn"
        class="bg-purple-600 text-white px-6 py-2 rounded hover:bg-purple-700">
          Login to Election
        </button>
      </div>
      <!-- Register -->
<div class="  bg-white p-8 rounded-xl shadow text-center hover:shadow-lg transition">
  <h2 class="text-2xl font-semibold mb-4">Register</h2>
  <p class="text-gray-600 mb-6">
    Create your voter account
  </p>
  <button id="register-btn"
  class="bg-yellow-600 text-white px-6 py-2 rounded hover:bg-yellow-700">
    Register Yourself
  </button>
</div>

    </div>

  </div>

  <script src="../js/index.js"></script>

</body>
</html>
